<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2d1a0e">
<meta name="description" content="The ultimate hazelnut idle clicker. Squirrels included.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutMania">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>🌰 NutMania</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brown-dark: #2d1a0e;
    --brown-mid: #5c3317;
    --brown-light: #8b5e3c;
    --brown-warm: #c4883a;
    --gold: #f5c842;
    --gold-light: #fde68a;
    --cream: #fdf3e3;
    --green: #4a7c3f;
    --green-light: #6aaf5c;
    --red: #c0392b;
    --shadow: rgba(45,26,14,0.4);
    --offline-color: #8899aa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito',sans-serif; background:var(--brown-dark); color:var(--cream);
    min-height:100vh; overflow-x:hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%,rgba(92,51,23,.4) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 20%,rgba(139,94,60,.2) 0%,transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%235c3317' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  /* HEADER */
  #header {
    position:sticky; top:0; z-index:100;
    background:linear-gradient(180deg,var(--brown-dark) 0%,rgba(45,26,14,.97) 100%);
    backdrop-filter:blur(10px); border-bottom:2px solid var(--brown-warm);
    padding:10px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px;
    box-shadow:0 4px 20px var(--shadow); user-select:none;
  }
  #header h1 { font-family:'Fredoka One',cursive; font-size:clamp(1rem,3vw,1.5rem); color:var(--gold); text-shadow:2px 2px 0 var(--brown-dark),0 0 20px rgba(245,200,66,.5); white-space:nowrap; }
  .stat-box { display:flex; flex-direction:column; align-items:center; background:rgba(92,51,23,.6); border:1px solid var(--brown-warm); border-radius:10px; padding:4px 12px; min-width:110px; }
  .stat-label { font-size:.58rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--brown-warm); }
  .stat-value { font-family:'Fredoka One',cursive; font-size:clamp(.9rem,2.5vw,1.3rem); color:var(--gold-light); text-shadow:0 0 10px rgba(245,200,66,.4); white-space:nowrap; }
  .stat-rate { font-size:.62rem; color:var(--green-light); font-weight:700; }
  /* LAYOUT */
  #app { display:grid; grid-template-columns:1fr 330px; min-height:calc(100vh - 66px); max-width:1200px; margin:0 auto; }
  /* CLICKER ZONE */
  #clicker-zone {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:20px; position:relative; min-height:500px; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }
  #forest-bg { position:absolute; bottom:0; left:0; right:0; height:120px; background:linear-gradient(180deg,transparent,rgba(74,124,63,.2)); overflow:hidden; }
  .tree { position:absolute; bottom:0; font-size:3rem; opacity:.3; animation:treeSway 4s ease-in-out infinite; }
  .tree:nth-child(1){left:5%;animation-delay:0s}.tree:nth-child(2){left:15%;animation-delay:.5s;font-size:4rem}
  .tree:nth-child(3){left:75%;animation-delay:1s}.tree:nth-child(4){right:5%;animation-delay:1.5s;font-size:4rem}
  @keyframes treeSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  /* BIG NUT */
  #big-nut-container {
    position:relative; cursor:pointer; z-index:10; outline:none;
    user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
  }
  #big-nut {
    font-size:clamp(100px,18vw,160px); line-height:1; display:block; pointer-events:none;
    filter:drop-shadow(0 10px 30px rgba(245,200,66,.4)) drop-shadow(0 0 60px rgba(245,200,66,.15));
    animation:nutFloat 3s ease-in-out infinite;
    user-select:none; -webkit-user-select:none;
    transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), filter 0.12s ease;
  }
  @keyframes nutFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
  #big-nut.clicked {
    animation: nutClickBounce 0.35s cubic-bezier(0.36,0.07,0.19,0.97) forwards !important;
    filter:drop-shadow(0 4px 15px rgba(245,200,66,.7)) drop-shadow(0 0 40px rgba(245,200,66,.5));
  }
  @keyframes nutClickBounce {
    0%   { transform: scale(1) rotate(-2deg); }
    25%  { transform: scale(0.82) rotate(-6deg); }
    60%  { transform: scale(1.08) rotate(3deg); }
    80%  { transform: scale(0.96) rotate(-1deg); }
    100% { transform: scale(1) rotate(-2deg); }
  }
  #nut-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:200px; height:200px; background:radial-gradient(circle,rgba(245,200,66,.2) 0%,transparent 70%); border-radius:50%; pointer-events:none; animation:glowPulse 2s ease-in-out infinite; }
  @keyframes glowPulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}
  #click-hint { font-size:.75rem; color:var(--brown-warm); margin-top:8px; font-weight:700; text-transform:uppercase; letter-spacing:2px; animation:hintBlink 2.5s ease-in-out infinite; user-select:none; }
  @keyframes hintBlink{0%,100%{opacity:.5}50%{opacity:1}}
  /* FLOATS */
  .float-num { position:fixed; pointer-events:none; font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--gold); text-shadow:1px 1px 0 var(--brown-dark),0 0 10px rgba(245,200,66,.8); animation:floatUp 1.2s ease-out forwards; z-index:999; white-space:nowrap; }
  .float-num.offline { color:var(--offline-color); font-size:2rem; }
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-60px) scale(1.2)}100%{opacity:0;transform:translateY(-100px) scale(.8)}}
  /* SQUIRRELS */
  .squirrel { position:absolute; font-size:2rem; pointer-events:none; z-index:5; filter:drop-shadow(2px 2px 4px var(--shadow)); }
  .squirrel.running { animation:squirrelRun linear infinite; }
  @keyframes squirrelRun{0%{transform:translateX(-80px) scaleX(1)}49%{transform:translateX(calc(100vw + 80px)) scaleX(1)}50%{transform:translateX(calc(100vw + 80px)) scaleX(-1)}100%{transform:translateX(-80px) scaleX(-1)}}
  /* SIDE PANEL */
  #side-panel { background:rgba(20,10,5,.6); border-left:2px solid var(--brown-mid); display:flex; flex-direction:column; overflow:hidden; }
  .tabs { display:flex; border-bottom:2px solid var(--brown-mid); }
  .tab { flex:1; padding:10px 4px; text-align:center; cursor:pointer; font-family:'Fredoka One',cursive; font-size:.82rem; color:var(--brown-warm); background:transparent; border:none; transition:all .2s; }
  .tab:hover { background:rgba(92,51,23,.3); color:var(--gold); }
  .tab.active { background:rgba(92,51,23,.5); color:var(--gold); border-bottom:2px solid var(--gold); margin-bottom:-2px; }
  .panel-content { flex:1; overflow-y:auto; padding:12px; scrollbar-width:thin; scrollbar-color:var(--brown-warm) transparent; }
  .panel-content::-webkit-scrollbar{width:4px}.panel-content::-webkit-scrollbar-thumb{background:var(--brown-warm);border-radius:2px}
  /* UPGRADE CARDS */
  .upgrade-card { background:linear-gradient(135deg,rgba(92,51,23,.5),rgba(45,26,14,.8)); border:1px solid var(--brown-mid); border-radius:12px; padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; user-select:none; }
  .upgrade-card::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(245,200,66,.08),transparent); transition:left .4s; }
  .upgrade-card:hover::before{left:100%}
  .upgrade-card:hover { border-color:var(--brown-warm); transform:translateY(-1px); box-shadow:0 4px 15px var(--shadow); }
  .upgrade-card.can-afford { border-color:var(--gold); box-shadow:0 0 12px rgba(245,200,66,.15); }
  .upgrade-card.can-afford:hover { box-shadow:0 0 20px rgba(245,200,66,.3); transform:translateY(-2px); }
  .upgrade-card.maxed { border-color:var(--green); opacity:.7; }
  .upgrade-card.locked { opacity:.32; cursor:not-allowed; pointer-events:none; filter:grayscale(.6); }
  .upg-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .upg-icon { font-size:1.5rem; }
  .upg-info { flex:1; }
  .upg-name { font-family:'Fredoka One',cursive; font-size:.9rem; color:var(--gold-light); line-height:1.1; }
  .upg-desc { font-size:.66rem; color:rgba(253,243,227,.6); font-style:italic; line-height:1.2; }
  .upg-count { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--brown-warm); min-width:32px; text-align:right; }
  .upg-count.maxed { color:var(--green-light); }
  .upg-footer { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
  .upg-cost { font-family:'Fredoka One',cursive; font-size:.8rem; color:var(--gold); }
  .upg-bonus { font-size:.63rem; color:var(--green-light); font-weight:700; }
  /* MILESTONES */
  .milestone-card { background:linear-gradient(135deg,rgba(74,124,63,.2),rgba(45,26,14,.8)); border:1px solid var(--green); border-radius:10px; padding:8px 10px; margin-bottom:6px; }
  .milestone-card.done { border-color:var(--gold); background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(45,26,14,.8)); }
  .milestone-name { font-family:'Fredoka One',cursive; font-size:.85rem; color:var(--gold-light); }
  .milestone-desc { font-size:.65rem; color:rgba(253,243,227,.6); }
  /* STATS */
  .stat-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(92,51,23,.3); font-size:.78rem; }
  .stat-row:last-child{border-bottom:none}
  .stat-row-label { color:rgba(253,243,227,.6); }
  .stat-row-val { font-family:'Fredoka One',cursive; color:var(--gold-light); }
  /* OFFLINE MODAL */
  #offline-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  #offline-modal.show{display:flex}
  .modal-box { background:linear-gradient(135deg,var(--brown-mid),var(--brown-dark)); border:2px solid var(--gold); border-radius:20px; padding:32px; max-width:400px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(245,200,66,.15); animation:modalPop .3s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes modalPop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
  .modal-nut { font-size:4rem; margin-bottom:12px; animation:nutFloat 2s ease-in-out infinite; }
  .modal-title { font-family:'Fredoka One',cursive; font-size:1.6rem; color:var(--gold); margin-bottom:8px; }
  .modal-sub { font-size:.85rem; color:rgba(253,243,227,.7); margin-bottom:16px; }
  .offline-time { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--offline-color); background:rgba(136,153,170,.1); border:1px solid var(--offline-color); border-radius:8px; padding:8px 16px; margin-bottom:8px; }
  .offline-earned { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--gold); text-shadow:0 0 20px rgba(245,200,66,.5); margin:8px 0 16px; }
  .btn-primary { background:linear-gradient(135deg,var(--brown-warm),var(--gold)); border:none; border-radius:12px; padding:12px 28px; font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--brown-dark); cursor:pointer; transition:all .2s; box-shadow:0 4px 15px rgba(245,200,66,.3); width:100%; }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(245,200,66,.5)}
  /* NOTIFS */
  #notif-container { position:fixed; top:80px; right:12px; z-index:500; display:flex; flex-direction:column; gap:6px; }
  .notif { background:linear-gradient(135deg,var(--brown-mid),var(--brown-dark)); border:1px solid var(--gold); border-radius:10px; padding:8px 14px; font-size:.78rem; font-weight:700; color:var(--gold-light); animation:notifSlide .3s ease,notifFade .4s ease 2.6s forwards; max-width:230px; box-shadow:0 4px 15px var(--shadow); }
  @keyframes notifSlide{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes notifFade{to{opacity:0;transform:translateX(100%)}}
  /* SECTION TITLES */
  .section-title { font-family:'Fredoka One',cursive; font-size:.68rem; text-transform:uppercase; letter-spacing:2px; color:var(--brown-warm); padding:8px 0 6px; border-bottom:1px solid rgba(92,51,23,.4); margin-bottom:8px; }
  /* PRESTIGE */
  .prestige-btn { width:100%; background:linear-gradient(135deg,#7b2d8b,#c0392b); border:2px solid #e056fd; border-radius:12px; padding:12px; font-family:'Fredoka One',cursive; font-size:1rem; color:white; cursor:pointer; text-align:center; margin-top:8px; transition:all .2s; box-shadow:0 0 20px rgba(224,86,253,.2); }
  .prestige-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 30px rgba(224,86,253,.4)}
  .prestige-btn:disabled{opacity:.4;cursor:not-allowed}
  .prestige-count { font-size:.7rem; font-family:'Nunito',sans-serif; font-weight:600; opacity:.8; }
  /* SPEECH BUBBLE */
  .speech-bubble { position:absolute; background:var(--cream); color:var(--brown-dark); border-radius:12px; padding:6px 10px; font-size:.7rem; font-weight:700; white-space:nowrap; pointer-events:none; z-index:20; animation:bubblePop 2.5s ease forwards; box-shadow:0 2px 8px var(--shadow); }
  .speech-bubble::after { content:''; position:absolute; bottom:-6px; left:10px; border:6px solid transparent; border-top-color:var(--cream); border-bottom:none; }
  @keyframes bubblePop{0%{transform:scale(0);opacity:0}15%{transform:scale(1.1);opacity:1}20%{transform:scale(1);opacity:1}75%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
  /* RIPPLE */
  .ripple { position:fixed; border-radius:50%; background:radial-gradient(circle,rgba(245,200,66,.5) 0%,transparent 70%); pointer-events:none; animation:rippleAnim .5s ease forwards; transform:translate(-50%,-50%); z-index:998; }
  @keyframes rippleAnim{0%{width:0;height:0;opacity:1}100%{width:100px;height:100px;opacity:0}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  /* RESPONSIVE */
  @media(max-width:700px){
    #app{grid-template-columns:1fr;grid-template-rows:auto auto}
    #side-panel{border-left:none;border-top:2px solid var(--brown-mid);min-height:400px;max-height:60vh}
    #clicker-zone{min-height:300px}
    #big-nut{font-size:90px!important}
  }
</style>
</head>
<body>

<div id="header">

<div id="app">
  <div id="clicker-zone">
    <div id="forest-bg">
      <span class="tree">🌲</span><span class="tree">🌳</span>

      <div class="section-title">🖱️ Click Upgrades</div>

      <div class="section-title">⚙️ Auto Production</div>

      <div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(92,51,23,.4)">
        <button onclick="resetGame()" style="width:100%;background:linear-gradient(135deg,#5a0a0a,#8b1a1a);border:1px solid #c0392b;border-radius:10px;padding:10px;font-family:'Fredoka One',cursive;font-size:.9rem;color:rgba(253,243,227,.7);cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='#e74c3c';this.style.color='#fdf3e3'" onmouseout="this.style.borderColor='#c0392b';this.style.color='rgba(253,243,227,.7)'">

<div id="offline-modal">
  <div class="modal-box">
    <div class="modal-nut">🌰</div>
    <div class="modal-title">Welcome back!</div>
    <div class="modal-sub" id="offline-squirrel-msg"></div>
    <div class="offline-time" id="offline-time-txt"></div>
    <div style="color:var(--brown-warm);font-size:.75rem;margin-bottom:4px;">Hazelnuts harvested (50% offline efficiency)</div>
    <div class="offline-earned" id="offline-earned-txt"></div>
    <button class="btn-primary" onclick="claimOffline()">🌰 Collect!</button>
  </div>
</div>

<div id="notif-container"></div>

<script>
// ============================================================
// NUMBER FORMATTING — named suffixes + scientific above 1e39
// ============================================================
const SUFFIXES = [
  [1e3,'K'],[1e6,'M'],[1e9,'Md'],[1e12,'B'],[1e15,'T'],
  [1e18,'Qa'],[1e21,'Qi'],[1e24,'Sx'],[1e27,'Sp'],[1e30,'Oc'],
  [1e33,'No'],[1e36,'Dc'],[1e39,'UDc'],
];

function formatNum(n, html=true) {
  if (!isFinite(n)||isNaN(n)) return '∞';
  if (n<0) return '-'+formatNum(-n,html);
  if (n<1000) return Math.floor(n).toString();
  if (n>=1e42) {
    const exp=Math.floor(Math.log10(n));
    const mant=(n/Math.pow(10,exp)).toFixed(2);
    return html ? mant+'×10<sup>'+exp+'</sup>' : mant+'e'+exp;
  }
  for (let i=SUFFIXES.length-1;i>=0;i--) {
    if (n>=SUFFIXES[i][0]) {
      const s=n/SUFFIXES[i][0];
      const d=s>=100?Math.floor(s).toString():s.toFixed(2).replace(/\.?0+$/,'');
      return d+' '+SUFFIXES[i][1];
    }
  }
  return Math.floor(n).toString();
}
const fmtP = n => formatNum(n, false); // plain text version

function formatTime(ms) {
  const s=Math.floor(ms/1000);
  if(s<60) return s+'s';
  const m=Math.floor(s/60),rs=s%60;
  if(m<60) return m+'m'+rs+'s';
  const h=Math.floor(m/60),rm=m%60;
  if(h<24) return h+'h'+rm+'m';
  return Math.floor(h/24)+'d'+h%24+'h';
}

// ============================================================
// GAME STATE
// ============================================================
const SAVE_KEY='noisette_v3';
let G={
  nuts:0,totalNuts:0,totalClicks:0,
  nutsPerClick:1,nutsPerSec:0,
  rawNps:0,capEfficiency:1,
  prestigeCount:0,prestigeMultiplier:1,
  lastSave:Date.now(),upgrades:{},
  milestonesAchieved:[],playTime:0,
};
function save(){G.lastSave=Date.now();try{localStorage.setItem(SAVE_KEY,JSON.stringify(G));}catch(e){}}
function load(){try{const r=localStorage.getItem(SAVE_KEY);if(r)Object.assign(G,JSON.parse(r));}catch(e){}}

// ============================================================
// CLICK UPGRADES
// ============================================================
const CLICK_UPGRADES=[
  {id:'fingers',icon:'🤌',name:'Golden Fingers',
   desc:'"My hand is worth a fortune." — you, to your mom.',
   baseCost:10,costMult:1.5,maxLevel:50,
   effect:lvl=>`+${lvl} /click`},
  {id:'nail_file',icon:'💅',name:'Nut File',
   desc:'For better grip. Or nails. No judgment.',
   baseCost:40,costMult:1.55,maxLevel:40,
   effect:lvl=>`+${lvl*2} /click`,requires:'fingers'},
  {id:'click_training',icon:'🏋️',name:'Click Coach',

function totalSpent(){
  let s=0;
  [...CLICK_UPGRADES,...AUTO_UPGRADES].forEach(u=>{
    const lvl=G.upgrades[u.id]||0;
    for(let i=0;i<lvl;i++) s+=Math.floor(u.baseCost*Math.pow(u.costMult,i));
  });
  return s;
}

// ============================================================
// SOFT CAP: NPS cannot exceed nuts × (5 / 86400) without penalty
// Above the cap, each extra unit of NPS yields diminishing returns.
// efficiency = cap_nps / raw_nps when raw > cap, else 1.
// Displayed as a "Saturation" warning in the header rate.
// ============================================================
const CAP_RATIO = 5 / 86400; // ×5 per day = 0.0000579/s per nut owned

function softCapEfficiency(rawNps, nuts) {
  if (nuts <= 0 || rawNps <= 0) return 1;
  const capNps = Math.max(nuts * CAP_RATIO, 0.5); // floor of 0.5/s so early game isn't hurt
  if (rawNps <= capNps) return 1;
  // Soft diminishing returns: efficiency = capNps / rawNps, so effective NPS = capNps + sqrt(excess)
  const excess = rawNps - capNps;
  const effectiveNps = capNps + Math.sqrt(excess * capNps);
  return effectiveNps / rawNps;
}

function recalcProduction(){
  const lvl=id=>G.upgrades[id]||0;
  // Click: additive base
  let npc=1+lvl('fingers')*1+lvl('nail_file')*2+lvl('click_training')*5;
  // Click: multiplicative
  if(lvl('oak_gloves')>0)       npc*=(1+lvl('oak_gloves')*0.5);
  if(lvl('squirrel_hands')>0)   npc*=(1+lvl('squirrel_hands'));
  if(lvl('turbo_click')>0)      npc*=(1+lvl('turbo_click')*2);
  if(lvl('click_aura')>0)       npc*=(1+lvl('click_aura')*4);
  if(lvl('quantum_finger')>0)   npc*=(1+lvl('quantum_finger')*8);
  if(lvl('god_click')>0)        npc*=(1+lvl('god_click')*25);
  if(lvl('nut_nova')>0)         npc*=(1+lvl('nut_nova')*100);
  if(lvl('omnipotent_click')>0) npc*=(1+lvl('omnipotent_click')*1000);
  // Auto: raw NPS
  let rawNps=0;
  AUTO_UPGRADES.forEach(u=>{const l=lvl(u.id);if(l>0)rawNps+=l*u.nps;});
  rawNps *= G.prestigeMultiplier;

  // Apply soft cap
  const eff = softCapEfficiency(rawNps, G.nuts);
  G.nutsPerClick = Math.max(1, Math.floor(npc * G.prestigeMultiplier));
  G.nutsPerSec   = rawNps * eff;
  G.rawNps       = rawNps;   // keep raw for display
  G.capEfficiency = eff;
}

function getUpgradeCost(upg,l){return Math.floor(upg.baseCost*Math.pow(upg.costMult,l));}
function isUnlocked(upg){return !upg.requires||(G.upgrades[upg.requires]||0)>=1;}

// ============================================================
// GAME LOOP
// ============================================================
let lastTick=Date.now();
function gameTick(){
  const now=Date.now(),dt=(now-lastTick)/1000;
  lastTick=now; G.playTime+=dt;

  // Recompute soft cap every tick since G.nuts changes continuously
  if(G.rawNps!==undefined){
    const eff=softCapEfficiency(G.rawNps,G.nuts);
    G.nutsPerSec=G.rawNps*eff;
    G.capEfficiency=eff;
  }

  if(G.nutsPerSec>0){const e=G.nutsPerSec*dt;G.nuts+=e;G.totalNuts+=e;}
  updateHeader();
  checkMilestones();
  // Live panel updates
  if(activeTab==='stats') renderStats();
  if(activeTab==='milestones') renderMilestones();
}

function updateHeader(){
  document.getElementById('nut-count').innerHTML=formatNum(G.nuts)+' 🌰';
  document.getElementById('nut-total').innerHTML=formatNum(G.totalNuts);

  const eff = G.capEfficiency || 1;
  const rateEl = document.getElementById('nut-rate');
  if(eff < 0.99){
    const pct = Math.round(eff * 100);
    rateEl.innerHTML=`+${formatNum(G.nutsPerSec)}/s <span style="color:#e87722;font-size:.58rem" title="Overproduction soft cap active: spend your nuts to raise the limit!">⚠️${pct}%</span>`;
  } else {
    rateEl.innerHTML='+'+formatNum(G.nutsPerSec)+'/s';
  }
  document.getElementById('prestige-display').textContent='⭐ ×'+G.prestigeMultiplier.toFixed(1);
}

  renderUpgrades(); updateHeader();

function buyUpgrade(id){
  const upg=[...CLICK_UPGRADES,...AUTO_UPGRADES].find(u=>u.id===id);
  if(!upg||!isUnlocked(upg)) return;
  const l=G.upgrades[id]||0;
  if(upg.maxLevel&&l>=upg.maxLevel) return;
  const cost=getUpgradeCost(upg,l);
  if(G.nuts<cost){shakeEl('upg-'+id);return;}
  G.nuts-=cost; G.upgrades[id]=l+1;
  recalcProduction(); updateSquirrels(); renderUpgrades(); save();
  notify(upg.icon+' '+upg.name+' niv.'+(l+1)+'!');
}
function shakeEl(id){
  const el=document.getElementById(id);if(!el)return;
  el.style.animation='none';el.offsetHeight;
  el.style.animation='shake .3s ease';setTimeout(()=>el.style.animation='',300);
}

// ============================================================
function makeCard(upg){
  const l=G.upgrades[upg.id]||0;
  const maxed=upg.maxLevel&&l>=upg.maxLevel;
  const unlocked=isUnlocked(upg);
  const cost=getUpgradeCost(upg,l);
  const canAfford=G.nuts>=cost;
  let cls='upgrade-card';
  if(!unlocked) cls+=' locked';
  else if(maxed) cls+=' maxed';
  else if(canAfford) cls+=' can-afford';
  const costHtml=maxed?'MAX ✓':
    `<span style="color:${canAfford?'var(--gold)':'var(--red)'}">${formatNum(cost)} 🌰</span>`;
  return `<div class="${cls}" id="upg-${upg.id}" onclick="buyUpgrade('${upg.id}')">
    <div class="upg-header">
      <span class="upg-icon">${upg.icon}</span>
      <div class="upg-info">
        <div class="upg-name">${upg.name}</div>
        <div class="upg-desc">${upg.desc}</div>
      </div>
      <div class="upg-count${maxed?' maxed':''}">${l}</div>
    </div>
    <div class="upg-footer">
      <span class="upg-cost">${costHtml}</span>
      <span class="upg-bonus">${upg.effect(l)}</span>
    </div>
  </div>`;
}

function renderUpgrades(){
  document.getElementById('click-upgrades').innerHTML=CLICK_UPGRADES.map(makeCard).join('');
  document.getElementById('auto-upgrades').innerHTML=AUTO_UPGRADES.map(makeCard).join('');
  renderPrestigeSection();
}

function renderPrestigeSection(){
  const threshold=Math.pow(10,7+G.prestigeCount*2);
  const canPrestige=G.totalNuts>=threshold;
  const newMult=+(G.prestigeMultiplier+0.5).toFixed(1);
  document.getElementById('prestige-section').innerHTML=`
    <div style="background:rgba(123,45,139,.2);border:1px solid #7b2d8b;border-radius:10px;padding:10px;margin-bottom:8px;font-size:.75rem;color:rgba(253,243,227,.7)">
      <strong style="color:#e056fd">⚠️ Prestige ${G.prestigeCount+1}</strong><br>
      Resets everything except achievements.<br>
      Multiplier: ×${G.prestigeMultiplier} → <strong style="color:var(--gold)">×${newMult}</strong><br>
      <span style="color:${canPrestige?'var(--green-light)':'var(--red)'}">Required: ${formatNum(threshold)} 🌰 total</span>
    </div>
    <button class="prestige-btn" onclick="doPrestige()" ${canPrestige?'':'disabled'}>
      ⭐ PRESTIGE!<br>
      <span class="prestige-count">Prestige #${G.prestigeCount+1} — ×${G.prestigeMultiplier} → ×${newMult}</span>
    </button>`;
}

// ============================================================
// PRESTIGE
// ============================================================
function doPrestige(){
  const threshold=Math.pow(10,7+G.prestigeCount*2);
  if(G.totalNuts<threshold) return;
  if(!confirm(`Prestige ${G.prestigeCount+1}: reset everything, multiplier ×${(G.prestigeMultiplier+0.5).toFixed(1)}? Are you sure?`)) return;
  G.prestigeCount++; G.prestigeMultiplier=+(1+G.prestigeCount*0.5).toFixed(1);
  G.nuts=0;G.totalNuts=0;G.totalClicks=0;G.upgrades={};G.nutsPerClick=1;G.nutsPerSec=0;
  recalcProduction();updateSquirrels();renderUpgrades();renderMilestones();renderStats();
  notify('⭐ PRESTIGE! ×'+G.prestigeMultiplier+' multiplier active!');save();
}

// ============================================================
// HARD RESET
// ============================================================
function resetGame(){
  const first = confirm('⚠️ FULL RESET ⚠️\n\nThis will permanently delete ALL your progress:\n• All hazelnuts\n• All upgrades\n• All achievements\n• All prestiges\n\nThere is no going back. Are you absolutely sure?');
  if(!first) return;
  const second = confirm('Last chance!\n\nYour entire save will be permanently wiped.\nConfirm?');
  if(!second) return;
  localStorage.removeItem(SAVE_KEY);
  Object.assign(G,{
    nuts:0,totalNuts:0,totalClicks:0,
    nutsPerClick:1,nutsPerSec:0,
    rawNps:0,capEfficiency:1,
    prestigeCount:0,prestigeMultiplier:1,
    lastSave:Date.now(),upgrades:{},
    milestonesAchieved:[],playTime:0,
  });
  recalcProduction();
  updateSquirrels();
  renderUpgrades();
  renderMilestones();
  renderStats();
  updateHeader();
  notify('🗑️ Save deleted. Fresh start!');
}

// ============================================================
// MILESTONES
// ============================================================
function checkMilestones(){
  let changed=false;
  MILESTONES.forEach(m=>{
    if(!G.milestonesAchieved.includes(m.id)&&m.check()){
      G.milestonesAchieved.push(m.id);
      notify('🏆 '+m.name+' unlocked!');changed=true;
    }
  });
  if(changed){renderMilestones();save();}
}
function renderMilestones(){
  document.getElementById('milestones-list').innerHTML=MILESTONES.map(m=>{
    const done=G.milestonesAchieved.includes(m.id);
    return`<div class="milestone-card ${done?'done':''}">
      <div class="milestone-name">${done?'✅ ':'🔒 '}${m.name}</div>
      <div class="milestone-desc">${m.desc}</div>
      ${done?`<div style="font-size:.63rem;color:var(--gold);margin-top:4px;font-style:italic">"${m.reward}"</div>`:''}
    </div>`;
  }).join('');
}

// ============================================================
// STATS
// ============================================================
function renderStats(){
  const eff = G.capEfficiency || 1;
  const capNps = Math.max((G.nuts||0) * CAP_RATIO, 0.5);
  const effPct = Math.round(eff*100);
  const rows=[
    ['Current hazelnuts',formatNum(G.nuts)+' 🌰'],
    ['Total harvested',formatNum(G.totalNuts)+' 🌰'],
    ['Per click',formatNum(G.nutsPerClick)],
    ['Effective /s',formatNum(G.nutsPerSec)+'/s'],
    ['Raw /s (before cap)',formatNum(G.rawNps||G.nutsPerSec)+'/s'],
    ['Production efficiency', eff>=0.99 ? '✅ 100% (no cap)' : `⚠️ ${effPct}% — spend nuts to raise cap!`],
    ['Cap threshold',formatNum(capNps)+'/s (= ×5/day on current stock)'],
    ['Total clicks',formatNum(G.totalClicks)],
    ['Total spent',formatNum(totalSpent())],
    ['Play time',formatTime(G.playTime*1000)],
    ['Prestiges',G.prestigeCount],
    ['Multiplier','×'+G.prestigeMultiplier],
    ['Achievements',G.milestonesAchieved.length+' / '+MILESTONES.length],
  ];
  document.getElementById('stats-list').innerHTML=
    `<div class="section-title">📊 Statistics</div>`+
    rows.map(([l,v])=>`<div class="stat-row"><span class="stat-row-label">${l}</span><span class="stat-row-val">${v}</span></div>`).join('');
}

// ============================================================
// TABS
// ============================================================
let activeTab = 'upgrades';
function showTab(name){
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel-content').forEach(p=>p.style.display='none');
  document.getElementById('panel-'+name).style.display='block';
  document.querySelectorAll('.tab')[['upgrades','milestones','stats'].indexOf(name)].classList.add('active');
  if(name==='stats') renderStats();
  if(name==='milestones') renderMilestones();
}

// ============================================================
// NOTIFICATIONS
// ============================================================
function notify(msg){
  const c=document.getElementById('notif-container');
  const el=document.createElement('div');
  el.className='notif';el.textContent=msg;
  c.appendChild(el);setTimeout(()=>el.remove(),3100);
}

// ============================================================
// OFFLINE
// ============================================================
const OFFLINE_MSGS=[
  "The squirrels kept grinding during your absence 🐿️",
  "Your rodent army didn't slack off!",
  "Absence = productivity. Squirrel philosophy.",
  "The machines kept running. You didn't. Shame.",
  "We almost went on strike. Fortunately.",
  "We respected the 35h limit. More or less.",
  "The squirrel CEO made bold decisions.",
];
function checkOffline(){
  const ms=Math.max(0,Date.now()-G.lastSave);
  if(ms<10000||G.nutsPerSec<0.01) return;
  const eff=Math.min(ms,24*3600*1000);
  const earned=G.nutsPerSec*(eff/1000)*0.5;
  if(earned<1) return;
  document.getElementById('offline-time-txt').textContent='⏰ Away for '+formatTime(ms);
  document.getElementById('offline-earned-txt').innerHTML='+'+formatNum(earned)+' 🌰';
  document.getElementById('offline-squirrel-msg').textContent=OFFLINE_MSGS[Math.floor(Math.random()*OFFLINE_MSGS.length)];
  document.getElementById('offline-modal')._earned=earned;
  document.getElementById('offline-modal').classList.add('show');
}
function claimOffline(){
  const earned=document.getElementById('offline-modal')._earned||0;
  G.nuts+=earned;G.totalNuts+=earned;
  document.getElementById('offline-modal').classList.remove('show');
  save();updateHeader();renderUpgrades();
}

// ============================================================
// INIT
// ============================================================
function init(){
  load();recalcProduction();checkOffline();
  renderUpgrades();renderMilestones();renderStats();
  updateSquirrels();updateHeader();
  setInterval(gameTick,100);
  setInterval(save,30000);
  setInterval(()=>{renderUpgrades();updateSquirrels();},2000);
  setInterval(()=>{if(G.nutsPerSec>0.5&&Math.random()<0.45)squirrelComment();},7000);
}

window.addEventListener('load',init);
window.addEventListener('beforeunload',save);
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){checkOffline();G.lastSave=Date.now();}
});
// Prevent text selection everywhere that matters
document.addEventListener('selectstart',e=>{
  if(e.target.closest('#clicker-zone')||e.target.closest('#header')||e.target.closest('.upgrade-card'))
    e.preventDefault();
});

// ============================================================
// PWA — Service Worker registration
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[NutMania] Service Worker registered, scope:', reg.scope))
      .catch(err => console.warn('[NutMania] Service Worker registration failed:', err));
  });
}
</script>
